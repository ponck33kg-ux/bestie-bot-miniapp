<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bestie Bot</title>
 <script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #9B4FA0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 80px;
  }

  .bg-glow {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 300px;
    background: radial-gradient(ellipse 80% 200px at 50% 0%, rgba(220,130,220,0.7) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    width: 100%;
    max-width: 390px;
    padding: 0 16px;
    position: relative;
    z-index: 1;
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 32px;
    margin-bottom: 16px;
  }
  .logo-img {
    width: 110px;
    height: 110px;
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .logo-img img { width: 100%; height: 100%; object-fit: cover; }
  .logo-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
  }

  .balance-row {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 12px 18px;
    margin-bottom: 10px;
    font-size: 20px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .topup-row {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 12px 18px;
    margin-bottom: 14px;
    font-size: 20px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .topup-plus {
    margin-left: auto;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #FF6B9D, #FF3B7A);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: white;
    box-shadow: 0 3px 10px rgba(255,60,120,0.5);
  }

  .free-msg {
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: white;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .section-title {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    text-align: center;
    margin-bottom: 12px;
  }

  .chars-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .char-card {
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    aspect-ratio: 0.75;
    border: 3px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .char-card:active { transform: scale(0.97); }
  .char-card.selected {
    border-color: white;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.4), 0 8px 24px rgba(0,0,0,0.3);
  }

  .char-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }

  .char-card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
    padding: 12px 10px 12px;
  }

  .char-name {
    display: inline-block;
    background: linear-gradient(135deg, #E8619A, #c8417a);
    color: white;
    font-size: 18px;
    font-weight: 900;
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 5px;
  }

  .char-desc {
    font-size: 10px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
    font-weight: 500;
  }

  .char-check {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, #E8619A, #c8417a);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 17px;
    font-weight: 900;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 2;
  }
  .char-card.selected .char-check { display: flex; }

  .start-btn-wrap {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 390px;
    padding: 12px 16px 24px;
    background: linear-gradient(to top, #9B4FA0 60%, transparent);
    z-index: 100;
  }
  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #E8619A, #c8417a);
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(232,97,154,0.5);
    transition: transform 0.15s, opacity 0.2s;
  }
  .start-btn:active { transform: scale(0.97); }
  .start-btn:disabled {
    opacity: 0.45;
    cursor: default;
    box-shadow: none;
  }

  .bottom-links {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .profile-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #E8619A, #c8417a);
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,97,154,0.4);
    transition: transform 0.15s;
  }
  .profile-btn:active { transform: scale(0.97); }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(30,27,46,0.95);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    z-index: 999;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="page">
  <div class="logo-wrap">
    <div class="logo-img">
      <img src="images/logo.jpg" alt="Bestie Bot">
    </div>
    <div class="logo-sub">Бот Безусловной Поддержки</div>
  </div>

  <div class="balance-row">Баланс: ⭐ <span id="balance">0</span> <span id="balanceWord">сообщений</span></div>

  <div class="topup-row" onclick="window.location.href='cashier.html'">
    Пополнить ⭐
    <div class="topup-plus">+</div>
  </div>

  <div class="free-msg">3 сообщения в день бесплатно!</div>

  <div class="section-title">Твои подруги</div>
  <div class="chars-grid">

    <div class="char-card" data-name="Ника" data-key="nika" onclick="selectChar(this)">
      <img src="images/nika.jpg" alt="Ника">
      <div class="char-check">✓</div>
      <div class="char-card-overlay">
        <div class="char-name">НИКА</div>
        <div class="char-desc">Рок'н'ролл<br>Бунтарка<br>Прямая и дерзкая</div>
      </div>
    </div>

    <div class="char-card" data-name="Вера" data-key="vera" onclick="selectChar(this)">
      <img src="images/vera.jpg" alt="Вера">
      <div class="char-check">✓</div>
      <div class="char-card-overlay">
        <div class="char-name">ВЕРА</div>
        <div class="char-desc">Уют и Книги<br>Тёплая и мягкая<br>Психология</div>
      </div>
    </div>

    <div class="char-card" data-name="Лола" data-key="lola" onclick="selectChar(this)">
      <img src="images/lola.jpg" alt="Лола">
      <div class="char-check">✓</div>
      <div class="char-card-overlay">
        <div class="char-name">ЛОЛА</div>
        <div class="char-desc">Огненная<br>Всё про отношения<br>Мода и стиль</div>
      </div>
    </div>

    <div class="char-card" data-name="Диана" data-key="diana" onclick="selectChar(this)">
      <img src="images/diana.jpg" alt="Диана">
      <div class="char-check">✓</div>
      <div class="char-card-overlay">
        <div class="char-name">ДИАНА</div>
        <div class="char-desc">Гламур<br>Заряжает энергией<br>Модная девушка</div>
      </div>
    </div>

  </div>

  <div class="bottom-links">
    <button class="profile-btn" onclick="openProfile()">Личный Профиль</button>
  </div>

  <div style="height: 90px;"></div>
</div>

<div class="start-btn-wrap">
  <button class="start-btn" id="startBtn" onclick="startDialog()">
    Начать диалог с подругой
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) tg.ready();

  const SERVER = 'https://worker-production-7cb04.up.railway.app';

  function pluralMessages(n) {
    const mod10 = n % 10;
    const mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return 'сообщение';
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return 'сообщения';
    return 'сообщений';
  }

  async function loadBalance() {
    try {
      const initData = tg?.initData || '';
      const res = await fetch(`${SERVER}/user_info?init_data=${encodeURIComponent(initData)}`);
      const data = await res.json();
      if (!data.ok) return;
      const balance = data.messages_balance || 0;
      document.getElementById('balance').textContent = balance;
      document.getElementById('balanceWord').textContent = pluralMessages(balance);
    } catch(e) {
      console.error('Ошибка загрузки баланса:', e);
    }
  }

  loadBalance();

  let selected = null;
  let lastClickTime = 0;

  function selectChar(card) {
    const now = Date.now();
    if (selected === card && now - lastClickTime < 400) {
      card.classList.remove('selected');
      selected = null;
      lastClickTime = 0;
      document.getElementById('startBtn').textContent = 'Начать диалог с подругой';
      return;
    }
    lastClickTime = now;
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selected = card;
    const name = card.dataset.name;
    const nameWith = {'Ника':'Никой','Вера':'Верой','Лола':'Лолой','Диана':'Дианой'}[name] || name;
    document.getElementById('startBtn').textContent = `Начать диалог с ${nameWith}`;
    showToast(`Выбрана ${name} ✓`);
  }

  async function startDialog() {
    if (!selected) {
      showToast('Выбери подругу для разговора 💕');
      return;
    }
    const key = selected.dataset.key;

    try {
      await fetch(`${SERVER}/answer_webapp_query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          character: key,
          init_data: tg.initData
        })
      });
    } catch(e) {
      console.error(e);
    }

    tg.close();
  }

  async function openProfile() {
    try {
      await fetch(`${SERVER}/answer_webapp_query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          action: 'profile',
          init_data: tg.initData
        })
      });
    } catch(e) {
      console.error(e);
    }

    tg.close();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
